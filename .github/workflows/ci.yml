name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo doc --workspace --all-features --no-deps

  scanner-perf-gate:
    name: scanner perf gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      SCANNER_BENCH_TOLERANCE_PCT: '700'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check PR branch perf gate
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: SCANNER_BENCH_OUTPUT_JSON=target/scanner-perf/pr.json scripts/check_scanner_perf.sh

      - name: Capture base benchmark metrics
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git worktree add /tmp/glyphnet-base origin/${{ github.base_ref }}
          mkdir -p /tmp/glyphnet-base/scripts
          cp scripts/check_scanner_perf.sh /tmp/glyphnet-base/scripts/check_scanner_perf.sh
          cd /tmp/glyphnet-base
          SCANNER_BENCH_OUTPUT_JSON=target/scanner-perf/base.json ./scripts/check_scanner_perf.sh --no-fail

      - name: Comment benchmark comparison on PR
        if: always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prPath = 'target/scanner-perf/pr.json';
            const basePath = '/tmp/glyphnet-base/target/scanner-perf/base.json';
            const pr = fs.existsSync(prPath)
              ? JSON.parse(fs.readFileSync(prPath, 'utf8'))
              : null;
            const base = fs.existsSync(basePath)
              ? JSON.parse(fs.readFileSync(basePath, 'utf8'))
              : null;
            const delta = pr && base ? pr.median_ms - base.median_ms : null;
            const deltaPct = pr && base && base.median_ms !== 0 ? (delta / base.median_ms) * 100 : null;
            const emoji = delta === null ? 'ℹ️' : delta <= 0 ? '✅' : '⚠️';
            const marker = '<!-- scanner-perf-comment -->';
            const body = [
              marker,
              '## Scanner perf (RibbonPrint fixture)',
              '',
              pr
                ? `${emoji} **PR median:** ${pr.median_ms.toFixed(3)} ms`
                : '⚠️ **PR median:** unavailable (PR benchmark did not produce target/scanner-perf/pr.json)',
              base
                ? `- **Base median (${context.payload.pull_request.base.ref}):** ${base.median_ms.toFixed(3)} ms`
                : `- **Base median (${context.payload.pull_request.base.ref}):** unavailable (base benchmark did not produce ${basePath})`,
              delta === null
                ? '- **Delta (PR - base):** unavailable'
                : `- **Delta (PR - base):** ${delta.toFixed(3)} ms (${deltaPct.toFixed(2)}%)`,
              pr
                ? `- **Profile budget:** ${pr.budget_ms.toFixed(3)} ms`
                : '- **Profile budget:** unavailable',
              pr
                ? `- **Allowed (budget + ${pr.tolerance_pct.toFixed(1)}%):** ${pr.allowed_ms.toFixed(3)} ms`
                : '- **Allowed threshold:** unavailable',
              pr
                ? `- **Gate status:** ${pr.status.toUpperCase()}`
                : '- **Gate status:** unavailable',
              '',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker) && c.user && c.user.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  wasm:
    name: wasm32 check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p glyphnet-wasm --target wasm32-unknown-unknown
