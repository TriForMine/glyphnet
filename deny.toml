[licenses]
allow = ["Apache-2.0", "MIT", "Unicode-3.0", "BSD-3-Clause", "BSD-2-Clause", "Zlib"]
confidence-threshold = 0.9

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = [
  # Transitive via parking_lot 0.11 -> parking_lot_core 0.8 / instant 0.1.
  # No safe upstream upgrade path is available in current dependency graph.
  "RUSTSEC-2024-0384",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
